<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Research SOP Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #21262d;
      --accent: #3b82f6; --accent2: #10b981; --warn: #f59e0b;
      --text: #e6edf3; --muted: #7d8590;
      --user-bg: #1d4ed8; --agent-bg: #1c2128; --radius: 12px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 58px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .header-text h1 { font-size: 1rem; font-weight: 600; }
    .header-text p { font-size: 0.72rem; color: var(--muted); }
    .badges { margin-left: auto; display: flex; gap: 6px; }
    .badge { font-size: 0.65rem; padding: 3px 9px; border-radius: 20px; font-weight: 600; letter-spacing: 0.05em; }
    .badge-rag { background: rgba(59,130,246,0.15); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
    .badge-mcp { background: rgba(16,185,129,0.15); color: var(--accent2); border: 1px solid rgba(16,185,129,0.3); }
    .layout { display: flex; flex: 1; overflow: hidden; }
    aside { width: 258px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 18px 14px; gap: 8px; overflow-y: auto; }
    .section-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 4px 2px 2px; }
    .phase-btn { display: flex; align-items: flex-start; gap: 9px; padding: 9px 11px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); text-align: left; transition: all 0.15s; width: 100%; line-height: 1.4; }
    .phase-btn:hover { background: rgba(59,130,246,0.08); border-color: var(--accent); }
    .phase-btn .icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .phase-btn .label { font-weight: 500; display: block; }
    .phase-btn .sub { font-size: 0.7rem; color: var(--muted); display: block; margin-top: 1px; }
    .stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-top: 6px; }
    .stat-card h3 { font-size: 0.67rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .stat-item { text-align: center; }
    .stat-num { font-size: 1.5rem; font-weight: 700; display: block; }
    .stat-lbl { font-size: 0.67rem; color: var(--muted); }
    .num-good { color: var(--accent2); } .num-all { color: var(--accent); }
    .bar-wrap { margin-top: 10px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
    .bar-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .action-btn { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 0.8rem; cursor: pointer; text-align: center; transition: all 0.15s; margin-top: 6px; }
    .action-btn:hover { background: rgba(255,255,255,0.05); }
    .action-btn.primary { border-color: var(--accent); color: var(--accent); }
    .action-btn.primary:hover { background: rgba(59,130,246,0.1); }
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #messages { flex: 1; overflow-y: auto; padding: 22px 20px; display: flex; flex-direction: column; gap: 14px; }
    .msg { display: flex; gap: 9px; animation: fadeUp 0.2s ease; }
    .msg.user  { align-self: flex-end;   flex-direction: row-reverse; max-width: 75%; }
    .msg.agent { align-self: flex-start; max-width: 84%; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 2px; }
    .msg.user  .avatar { background: var(--user-bg); }
    .msg.agent .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .bubble { padding: 11px 15px; border-radius: var(--radius); font-size: 0.875rem; line-height: 1.65; }
    .msg.user  .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 3px; }
    .msg.agent .bubble { background: var(--agent-bg); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
    .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    .input-bar { padding: 14px 18px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 9px; align-items: flex-end; }
    #input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.88rem; padding: 11px 14px; resize: none; min-height: 44px; max-height: 110px; outline: none; font-family: inherit; transition: border-color 0.15s; line-height: 1.5; }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--muted); }
    #send { width: 44px; height: 44px; border-radius: 10px; background: var(--accent); border: none; color: #fff; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s, transform 0.1s; flex-shrink: 0; }
    #send:hover { opacity: 0.85; } #send:active { transform: scale(0.94); } #send:disabled { opacity: 0.35; cursor: not-allowed; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    @media (max-width: 640px) { aside { display: none; } }
  </style>
</head>
<body>
<header>
  <div class="logo">🔬</div>
  <div class="header-text">
    <h1>Survey Research SOP Agent</h1>
    <p>Methodology review · Powered by Claude</p>
  </div>
  <div class="badges">
    <span class="badge badge-rag">RAG</span>
    <span class="badge badge-mcp">MCP</span>
  </div>
</header>
<div class="layout">
  <aside>
    <span class="section-label">Research Phases</span>
    <button class="phase-btn" onclick="quickSend('I want to review my Research Design and Problem Formulation.')">
      <span class="icon">🎯</span><span><span class="label">Research Design</span><span class="sub">Problem · objectives · scope</span></span>
    </button>
    <button class="phase-btn" onclick="quickSend('I want to review my Ethics and IRB compliance.')">
      <span class="icon">⚖️</span><span><span class="label">Ethics & IRB / REB</span><span class="sub">Consent · approval · anonymity</span></span>
    </button>
    <button class="phase-btn" onclick="quickSend('I want to review my questionnaire and instrument design.')">
      <span class="icon">📝</span><span><span class="label">Questionnaire Design</span><span class="sub">Items · scales · pilot testing</span></span>
    </button>
    <button class="phase-btn" onclick="quickSend('I want to review my sampling methodology and recruitment.')">
      <span class="icon">🎲</span><span><span class="label">Sampling & Recruitment</span><span class="sub">Sample size · strategy · response rate</span></span>
    </button>
    <button class="phase-btn" onclick="quickSend('I want to review my data collection and field procedures.')">
      <span class="icon">📡</span><span><span class="label">Data Collection</span><span class="sub">Field protocol · security · monitoring</span></span>
    </button>
    <button class="phase-btn" onclick="quickSend('I want to review my data quality, cleaning and validation.')">
      <span class="icon">🧹</span><span><span class="label">Data Quality & Cleaning</span><span class="sub">Duplicates · missingness · outliers</span></span>
    </button>
    <button class="phase-btn" onclick="quickSend('I want to review my analysis and reporting plan.')">
      <span class="icon">📊</span><span><span class="label">Analysis & Reporting</span><span class="sub">Pre-reg · statistics · open science</span></span>
    </button>
    <div style="margin-top:auto;">
      <span class="section-label">Session</span>
      <div class="stat-card">
        <h3>Methodology Score</h3>
        <div class="stat-grid">
          <div class="stat-item"><span class="stat-num num-all" id="stat-total">0</span><span class="stat-lbl">Assessed</span></div>
          <div class="stat-item"><span class="stat-num num-good" id="stat-ok">0</span><span class="stat-lbl">Compliant</span></div>
        </div>
        <div class="bar-wrap">
          <div class="bar-label"><span>Quality</span><span id="stat-pct">—</span></div>
          <div class="bar-track"><div class="bar-fill" id="stat-bar" style="width:0%"></div></div>
        </div>
      </div>
      <button class="action-btn primary" onclick="quickSend('Please give me a full methodology quality report with prioritised recommendations.')">📋 Full Report</button>
      <button class="action-btn" onclick="resetSession()" style="color:var(--muted);">🔄 New Session</button>
    </div>
  </aside>
  <div class="chat-area">
    <div id="messages"></div>
    <div class="input-bar">
      <textarea id="input" rows="1" placeholder="Describe your study, answer a question, or choose a phase on the left…"></textarea>
      <button id="send" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>
<script>
  let sessionId = crypto.randomUUID();
  let busy = false;
  const $msgs = document.getElementById('messages');
  const $input = document.getElementById('input');
  const $send = document.getElementById('send');
  function scrollBottom() { $msgs.scrollTop = $msgs.scrollHeight; }
  function fmt(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  }
  function addMsg(role, text) {
    const w = document.createElement('div');
    w.className = `msg ${role}`;
    w.innerHTML = `<div class="avatar">${role==='user'?'👤':'🔬'}</div><div class="bubble">${fmt(text)}</div>`;
    $msgs.appendChild(w); scrollBottom();
  }
  function showTyping() {
    const el = document.createElement('div');
    el.className='msg agent typing'; el.id='typing';
    el.innerHTML=`<div class="avatar">🔬</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    $msgs.appendChild(el); scrollBottom();
  }
  function hideTyping() { document.getElementById('typing')?.remove(); }
  function updateStats(total, ok) {
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-ok').textContent = ok;
    if (total > 0) {
      const pct = Math.round(ok / total * 100);
      document.getElementById('stat-pct').textContent = pct + '%';
      document.getElementById('stat-bar').style.width = pct + '%';
    }
  }
  async function sendMessage(text) {
    const msg = (text || $input.value).trim();
    if (!msg || busy) return;
    $input.value = ''; $input.style.height = 'auto';
    setBusy(true); addMsg('user', msg); showTyping();
    try {
      const res = await fetch('/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message: msg, session_id: sessionId })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      hideTyping(); addMsg('agent', data.response);
      if (data.total_responses > 0) {
        const s = await fetch('/api/session/' + sessionId).then(r=>r.json());
        const vals = Object.values(s.responses);
        updateStats(vals.length, vals.filter(v=>v.compliant).length);
      }
    } catch(err) { hideTyping(); addMsg('agent','Error: '+err.message); }
    finally { setBusy(false); }
  }
  function quickSend(t) { sendMessage(t); }
  function setBusy(s) { busy=s; $send.disabled=s; $input.disabled=s; }
  function resetSession() {
    sessionId = crypto.randomUUID(); $msgs.innerHTML='';
    updateStats(0,0); document.getElementById('stat-pct').textContent='—';
    document.getElementById('stat-bar').style.width='0%'; greet();
  }
  $input.addEventListener('input',()=>{ $input.style.height='auto'; $input.style.height=Math.min($input.scrollHeight,110)+'px'; });
  $input.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
  function greet() {
    addMsg('agent',
      "👋 Welcome to the **Survey Research SOP Agent**.\n\n" +
      "I'll review your study design against established survey research methodology standards " +
      "— from problem formulation all the way through to reporting.\n\n" +
      "**Choose a phase on the left** to get started, or describe your study and I'll identify which area needs attention:\n\n" +
      "🎯 Research Design  ·  ⚖️ Ethics & IRB  ·  📝 Questionnaire Design\n" +
      "🎲 Sampling  ·  📡 Data Collection  ·  🧹 Data Quality  ·  📊 Analysis & Reporting"
    );
  }
  greet();
</script>
</body>
</html>
